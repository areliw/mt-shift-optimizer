<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT Shift Optimizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    padding: 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  h1 { font-size: 1.6rem; color: #1a73e8; margin-bottom: 8px; }
  .subtitle { color: #666; margin-bottom: 28px; font-size: 0.95rem; }
  .create-section { margin-bottom: 28px; }
  .create-section input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    margin-bottom: 12px;
    outline: none;
  }
  .create-section input:focus { border-color: #1a73e8; }
  .btn-primary {
    width: 100%;
    padding: 12px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-primary:hover { background: #1557b0; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: #999;
    font-size: 0.85rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #ddd;
  }
  .workspace-list { text-align: left; }
  .workspace-list h3 { font-size: 0.95rem; color: #333; margin-bottom: 12px; }
  .ws-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border: 1px solid #e8e8e8;
    border-radius: 8px;
    margin-bottom: 8px;
    text-decoration: none;
    color: #333;
    transition: background 0.15s;
  }
  .ws-item:hover { background: #f5f8ff; border-color: #1a73e8; }
  .ws-name { font-weight: 500; }
  .ws-date { font-size: 0.8rem; color: #999; }
  .ws-arrow { color: #1a73e8; font-size: 1.2rem; }
  .ws-delete {
    background: none; border: none; color: #ccc; cursor: pointer;
    font-size: 1.1rem; padding: 4px 8px; border-radius: 4px; transition: color 0.15s;
  }
  .ws-delete:hover { color: #e53935; }
  .ws-right { display: flex; align-items: center; gap: 4px; }
  .empty-msg { color: #999; font-size: 0.9rem; padding: 12px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>MT Shift Optimizer</h1>
  <p class="subtitle">ระบบจัดเวรอัตโนมัติ สำหรับแผนก MT</p>

  <div class="create-section">
    <input type="text" id="wsName" placeholder="ชื่อ workspace (เช่น รพ.ของฉัน)" maxlength="100">
    <button class="btn-primary" id="btnCreate" onclick="createWorkspace()">สร้าง Workspace ใหม่</button>
  </div>

  <div class="divider">หรือเลือก workspace ที่มีอยู่</div>

  <div class="workspace-list" id="wsList">
    <p class="empty-msg">กำลังโหลด...</p>
  </div>
</div>

<script>
// ws_tokens: { workspaceId: token, ... } stored per browser
function _getTokens() { try { return JSON.parse(localStorage.getItem('ws_tokens') || '{}'); } catch { return {}; } }
function _saveTokens(t) { localStorage.setItem('ws_tokens', JSON.stringify(t)); }

async function loadWorkspaces() {
  try {
    const r = await fetch('/api/workspaces');
    if (!r.ok) { document.getElementById('wsList').innerHTML = '<p class="empty-msg">โหลดไม่สำเร็จ ('+r.status+')</p>'; return; }
    const list = await r.json();
    const tokens = _getTokens();

    // ถ้า server ส่ง token มาด้วย (dev mode) → sync เข้า localStorage ทั้งหมด
    for (const ws of list) {
      if (ws.token && !tokens[ws.id]) {
        tokens[ws.id] = ws.token;
      }
    }
    _saveTokens(tokens);

    // แสดงเฉพาะ workspace ที่เครื่องนี้มี token
    const mine = list.filter(ws => tokens[ws.id]);
    const el = document.getElementById('wsList');
    if (!mine.length) {
      el.innerHTML = '<p class="empty-msg">ยังไม่มี workspace ในเครื่องนี้ — สร้างใหม่ได้เลย</p>';
      return;
    }
    el.innerHTML = '<h3>Workspace ของเครื่องนี้</h3>';
    for (const ws of mine) {
      const name = ws.name || ('Workspace ' + ws.id);
      const date = ws.created_at ? new Date(ws.created_at + 'Z').toLocaleDateString('th-TH') : '';
      const tok = tokens[ws.id] || '';
      // ใส่ token ใน hash เพื่อให้หน้า workspace อ่านได้ถ้า localStorage หาย
      const href = '/w/' + ws.id + '/#t=' + encodeURIComponent(tok);
      const item = document.createElement('div');
      item.className = 'ws-item';
      const link = document.createElement('a');
      link.href = href;
      link.style.cssText = 'text-decoration:none;color:inherit;flex:1';
      link.innerHTML = '<div class="ws-name">' + escHtml(name) + '</div><div class="ws-date">' + date + '</div>';
      const right = document.createElement('div');
      right.className = 'ws-right';
      const del = document.createElement('button');
      del.className = 'ws-delete';
      del.title = 'ลบ workspace';
      del.textContent = '\u00d7';
      del.onclick = function(e) { e.stopPropagation(); deleteWorkspace(ws.id, name, tok); };
      right.appendChild(del);
      const arrow = document.createElement('a');
      arrow.href = href;
      arrow.className = 'ws-arrow';
      arrow.style.cssText = 'text-decoration:none';
      arrow.innerHTML = '&rarr;';
      right.appendChild(arrow);
      item.appendChild(link);
      item.appendChild(right);
      el.appendChild(item);
    }
  } catch(e) {
    document.getElementById('wsList').innerHTML = '<p class="empty-msg">โหลดไม่สำเร็จ</p>';
  }
}

async function createWorkspace() {
  const btn = document.getElementById('btnCreate');
  const nameInput = document.getElementById('wsName');
  btn.disabled = true;
  btn.textContent = 'กำลังสร้าง...';
  try {
    const r = await fetch('/api/workspaces', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: nameInput.value.trim()})
    });
    const data = await r.json();
    // บันทึก token ลง localStorage ของเครื่องนี้
    const tokens = _getTokens();
    tokens[data.id] = data.token;
    _saveTokens(tokens);
    window.location.href = '/w/' + data.id + '/#t=' + encodeURIComponent(data.token);
  } catch(e) {
    alert('สร้าง workspace ไม่สำเร็จ');
    btn.disabled = false;
    btn.textContent = 'สร้าง Workspace ใหม่';
  }
}

async function deleteWorkspace(id, name, token) {
  if (!confirm('ลบ workspace "' + name + '" ?\nข้อมูลทั้งหมดจะหายไป')) return;
  try {
    const r = await fetch('/api/workspaces/' + id, {
      method: 'DELETE',
      headers: {'X-Workspace-Token': token || ''}
    });
    if (!r.ok) throw new Error(r.status);
    // ลบ token ออกจาก localStorage ด้วย
    const tokens = _getTokens();
    delete tokens[id];
    _saveTokens(tokens);
    loadWorkspaces();
  } catch(e) {
    alert('ลบไม่สำเร็จ');
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('wsName').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') createWorkspace();
});

loadWorkspaces();
</script>
</body>
</html>
