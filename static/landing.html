<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT Shift Optimizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    padding: 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  h1 { font-size: 1.6rem; color: #1a73e8; margin-bottom: 8px; }
  .subtitle { color: #666; margin-bottom: 28px; font-size: 0.95rem; }
  .create-section { margin-bottom: 28px; }
  .create-section input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    margin-bottom: 12px;
    outline: none;
  }
  .create-section input:focus { border-color: #1a73e8; }
  .btn-primary {
    width: 100%;
    padding: 12px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-primary:hover { background: #1557b0; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: #999;
    font-size: 0.85rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #ddd;
  }
  .workspace-list { text-align: left; }
  .workspace-list h3 { font-size: 0.95rem; color: #333; margin-bottom: 12px; }
  .ws-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border: 1px solid #e8e8e8;
    border-radius: 8px;
    margin-bottom: 8px;
    text-decoration: none;
    color: #333;
    transition: background 0.15s;
  }
  .ws-item:hover { background: #f5f8ff; border-color: #1a73e8; }
  .ws-name { font-weight: 500; }
  .ws-date { font-size: 0.8rem; color: #999; }
  .ws-arrow { color: #1a73e8; font-size: 1.2rem; }
  .empty-msg { color: #999; font-size: 0.9rem; padding: 12px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>MT Shift Optimizer</h1>
  <p class="subtitle">ระบบจัดเวรอัตโนมัติ สำหรับแผนก MT</p>

  <div class="create-section">
    <input type="text" id="wsName" placeholder="ชื่อ workspace (เช่น รพ.ของฉัน)" maxlength="100">
    <button class="btn-primary" id="btnCreate" onclick="createWorkspace()">สร้าง Workspace ใหม่</button>
  </div>

  <div class="divider">หรือเลือก workspace ที่มีอยู่</div>

  <div class="workspace-list" id="wsList">
    <p class="empty-msg">กำลังโหลด...</p>
  </div>
</div>

<script>
async function loadWorkspaces() {
  try {
    const r = await fetch('/api/workspaces');
    const list = await r.json();
    const el = document.getElementById('wsList');
    if (!list.length) {
      el.innerHTML = '<p class="empty-msg">ยังไม่มี workspace — สร้างใหม่ได้เลย</p>';
      return;
    }
    el.innerHTML = '<h3>Workspace ที่มีอยู่</h3>';
    for (const ws of list) {
      const name = ws.name || ('Workspace ' + ws.id);
      const date = ws.created_at ? new Date(ws.created_at + 'Z').toLocaleDateString('th-TH') : '';
      el.innerHTML += '<a class="ws-item" href="/w/' + ws.id + '/">' +
        '<div><div class="ws-name">' + escHtml(name) + '</div>' +
        '<div class="ws-date">' + date + '</div></div>' +
        '<span class="ws-arrow">&rarr;</span></a>';
    }
  } catch(e) {
    document.getElementById('wsList').innerHTML = '<p class="empty-msg">โหลดไม่สำเร็จ</p>';
  }
}

async function createWorkspace() {
  const btn = document.getElementById('btnCreate');
  const nameInput = document.getElementById('wsName');
  btn.disabled = true;
  btn.textContent = 'กำลังสร้าง...';
  try {
    const r = await fetch('/api/workspaces', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: nameInput.value.trim()})
    });
    const data = await r.json();
    window.location.href = data.url;
  } catch(e) {
    alert('สร้าง workspace ไม่สำเร็จ');
    btn.disabled = false;
    btn.textContent = 'สร้าง Workspace ใหม่';
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('wsName').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') createWorkspace();
});

loadWorkspaces();
</script>
</body>
</html>
